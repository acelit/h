  .card .tech span{font-size:11px;padding:3px 8px;border-radius:6px;background:var(--chip);color:#b7c0d0;border:1px solid var(--border)}

  .ext{font-size:10px;color:#0f1117;background:var(--accent2);padding:1px 6px;border-radius:5px;margin-left:auto}
  .empty{text-align:center;color:var(--muted);padding:60px 0;font-size:15px}
  footer{text-align:center;color:var(--muted);font-size:12.5px;padding:24px;border-top:1px solid var(--border)}

let activeCat = "all", keyword = "";
const filters = document.getElementById("filters");
const grid = document.getElementById("grid");
const empty = document.getElementById("empty");
document.getElementById("stat").textContent = CATS.length + " 个分类 · " + DATA.length + " 个项目（项目名已全部汉化，鼠标可见英文原名）";

function makeChip(id, label, count){
  const el = document.createElement("div");
  el.className = "chip" + (id===activeCat?" active":"");
  el.textContent = label + (count!=null?(" "+count):"");
  el.onclick = ()=>{activeCat=id; [...filters.children].forEach(c=>c.classList.remove("active")); el.classList.add("active"); render();};
  return el;
}
filters.appendChild(makeChip("all","全部",DATA.length));
CATS.forEach(c=>filters.appendChild(makeChip(c.id, c.emoji+" "+c.cn, c.count)));
document.getElementById("search").addEventListener("input", e=>{keyword=e.target.value.trim().toLowerCase(); render();});

function render(){
  const kw = keyword;
  const items = DATA.filter(d=>{
    if(activeCat!=="all" && d.catId!==activeCat) return false;
    if(!kw) return true;
    const hay = (d.cn+" "+d.en+" "+d.desc+" "+d.tech.join(" ")+" "+d.cat).toLowerCase();
    return hay.includes(kw);
  });
  grid.innerHTML = "";
  empty.style.display = items.length? "none":"block";
  items.forEach(d=>{
    const a = document.createElement("a");
    a.className="card"; a.href=d.url; a.target="_blank"; a.rel="noopener"; a.title=d.en;
    const tech = d.tech.map(t=>`<span>${t}</span>`).join("");
    a.innerHTML = `

      <div class="desc">${d.desc}</div>

  });
}
