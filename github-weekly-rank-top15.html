<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GitHub 本周飙升榜 Top 20</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    background:#0b1020;
    color:#e6ecff;
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
    padding:48px 32px;
    min-height:100vh;
  }
  .container{max-width:820px;margin:0 auto}

  .title{
    text-align:center;
    font-size:34px;
    font-weight:900;
    letter-spacing:2px;
    background:linear-gradient(90deg,#a78bfa,#f472b6,#fb923c,#facc15,#34d399,#38bdf8);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    background-clip:text;
    margin-bottom:28px;
  }
  .subtitle{
    text-align:center;
    color:#6b78a8;
    font-size:14px;
    font-style:italic;
    margin-top:8px;
  }

  .header{
    display:grid;
    grid-template-columns:400px 110px 1fr 110px;
    align-items:center;
    padding:18px 16px;
    background:#162041;
    border:1px solid #27325a;
    border-radius:10px;
    margin-bottom:4px;
  }
  .header span{font-size:15px;font-weight:800;color:#f472b6}
  .header span:nth-child(2){color:#38bdf8}
  .header span:nth-child(3){color:#a78bfa}
  .header span:nth-child(4){color:#facc15;text-align:left}

  .item{
    display:grid;
    grid-template-columns:400px 110px 1fr 110px;
    align-items:center;
    padding:16px 16px;
    border:1px solid #27325a;
    border-top:none;
    background:#111933;
    transition:background .15s;
    opacity:0;
    transform:translateY(20px);
    animation:slideIn 1s ease forwards;
  }
  .item:first-child{border-top:1px solid #27325a;border-radius:10px 10px 0 0}
  .item:last-child{border-radius:0 0 10px 10px}
  .item:hover{background:#1c2952}

  @keyframes slideIn{to{opacity:1;transform:translateY(0)}}

  .name-cell{display:flex;align-items:center;gap:12px}
  .rank-num{font-size:13px;font-weight:800;color:#6b78a8;width:22px;text-align:right;flex-shrink:0}
  .avatar{
    width:36px;height:36px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-size:14px;font-weight:800;color:#0b1020;flex-shrink:0;
  }
  .project-name{font-size:21px;font-weight:700;color:#e6ecff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .project-name.keep{font-size:14px}

  .tag-badge{
    display:inline-block;padding:4px 10px;border-radius:6px;
    font-size:11.5px;font-weight:600;background:#0b1020;
    border:1px solid #27325a;color:#9aa7d0;white-space:nowrap;
  }

  .desc{font-size:12.5px;color:#9aa7d0;line-height:1.4;padding-right:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

  .stars{text-align:left;font-size:15px;font-weight:800;white-space:nowrap}
  .stars .bolt{margin-right:3px}
  .stars.tier1{color:#facc15}
  .stars.tier2{color:#fb923c}
  .stars.tier3{color:#34d399}

  .footer{
    text-align:center;margin-top:32px;
    opacity:0;animation:fadeIn .5s ease forwards;
    animation-delay:8.5s;
  }
  @keyframes fadeIn{to{opacity:1}}
  .footer .brand{font-size:15px;color:#fff;font-weight:800;letter-spacing:1px;display:flex;align-items:center;justify-content:center;gap:8px}
  .brand-logo{width:28px;height:28px;border-radius:50%;object-fit:cover}

  @media(max-width:800px){
    body{padding:24px 12px}
    .header,.item{grid-template-columns:260px 88px 1fr 76px;gap:4px}
    .title{font-size:22px}
    .project-name{font-size:12px}
    .desc{font-size:11px}
  }
</style>
</head>
