<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI产业链跌幅榜 · 近一月</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0b1020;color:#e6ecff;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;padding:48px 32px;min-height:100vh}
  .container{max-width:840px;margin:0 auto}
  .title{text-align:center;font-size:34px;font-weight:900;letter-spacing:2px;margin-bottom:26px;background:linear-gradient(90deg,#f43f5e,#fb7185,#fb923c,#facc15,#a78bfa,#38bdf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .subtitle{text-align:center;color:#8b96c4;font-size:13.5px;margin-bottom:26px;line-height:1.6}
  .subtitle .em{color:#f472b6;font-style:normal}
  .header{display:grid;grid-template-columns:56px 210px 118px 1fr 104px;align-items:center;padding:16px 16px;background:#162041;border:1px solid #27325a;border-radius:10px;margin-bottom:4px}
  .header span{font-size:14px;font-weight:800}
  .header .h-rank{color:#8b96c4}
  .header .h-name{color:#f472b6}
  .header .h-tag{color:#38bdf8}
  .header .h-desc{color:#a78bfa}
  .header .h-drop{color:#f43f5e;text-align:left}
  .item{display:grid;grid-template-columns:56px 210px 118px 1fr 104px;align-items:center;padding:15px 16px;border:1px solid #27325a;border-top:none;background:#111933;transition:background .15s;opacity:0;transform:translateY(20px);animation:slideIn 1s ease forwards}
  .item:first-child{border-top:1px solid #27325a;border-radius:10px 10px 0 0}
  .item:last-child{border-radius:0 0 10px 10px}
  .item:hover{background:#1c2952}
  @keyframes slideIn{to{opacity:1;transform:translateY(0)}}
  .rank-num{font-size:16px;font-weight:800;color:#5c6a9c;font-variant-numeric:tabular-nums}
  .item:nth-child(-n+3) .rank-num{color:#f43f5e}
  .name-cell{display:flex;align-items:center;gap:12px}
  .avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:#0b1020;flex-shrink:0}
  .project-name{font-size:21.75px;font-weight:700;color:#e6ecff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .tag-badge{display:inline-block;padding:4px 10px;border-radius:6px;font-size:11.5px;font-weight:600;background:#0b1020;border:1px solid #27325a;color:#9aa7d0;white-space:nowrap}
  .desc{font-size:12.5px;color:#9aa7d0;line-height:1.4;padding-right:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-variant-numeric:tabular-nums}
  .drop{text-align:left;font-size:16px;font-weight:800;white-space:nowrap;font-variant-numeric:tabular-nums}
  .drop .arw{margin-right:2px;font-size:12px}
  .drop.tier1{color:#f43f5e}
  .drop.tier2{color:#fb923c}
  .drop.tier3{color:#facc15}
  .note{margin-top:16px;font-size:11.5px;color:#6b78a8;line-height:1.7;text-align:center;padding:0 6px}
  .footer{text-align:center;margin-top:26px;opacity:0;animation:fadeIn .5s ease forwards;animation-delay:11.0s}
  @keyframes fadeIn{to{opacity:1}}
  .footer .brand{font-size:15px;color:#fff;font-weight:800;letter-spacing:1px;display:flex;align-items:center;justify-content:center;gap:8px}
  .brand-logo{width:28px;height:28px;border-radius:50%;object-fit:cover}
  .header span:nth-child(4),.item>div:nth-child(4){transform:translateX(50px)}
  .header span:nth-child(5),.item>div:nth-child(5){transform:translateX(-100px)}
  .tip{margin-top:12px;font-size:12px;color:#6b78a8;letter-spacing:.5px}
  @media(max-width:840px){
    body{padding:24px 12px}
    .header,.item{grid-template-columns:34px 96px 74px 1fr 66px;gap:4px;padding:12px 8px}
    .title{font-size:20px}
    .project-name{font-size:17.25px}
    .desc{font-size:10.5px}
    .drop{font-size:12.5px}
    .avatar{width:26px;height:26px;font-size:11px}
    .tag-badge{padding:3px 6px;font-size:10px}
  }
</style>
</head>
