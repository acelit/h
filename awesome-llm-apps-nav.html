<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>超棒的 LLM 应用大全 · 全中文交互导航</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,900&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* Hallmark · macrostructure: Directory + Sidebar Rail · theme: Almanac · tone: curated-reference · accent hue: botanical ink-green */
/* Hallmark · critique: P5 H5 E4 S5 R4 V5 */
:root{
  --font-display:"Fraunces","Songti SC","STSong","Noto Serif SC",Georgia,serif;
  --font-body:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei","Segoe UI",Roboto,sans-serif;
  --font-mono:"IBM Plex Mono",ui-monospace,"SFMono-Regular",Menlo,monospace;

  --paper:oklch(96.5% 0.018 95);
  --paper-raised:oklch(93.5% 0.022 95);
  --paper-inset:oklch(98% 0.012 95);
  --ink:oklch(27% 0.02 70);
  --ink-soft:oklch(46% 0.02 70);
  --ink-faint:oklch(60% 0.016 75);
  --rule:oklch(84% 0.02 88);
  --rule-strong:oklch(72% 0.025 85);
  --accent:oklch(46% 0.1 148);
  --accent-deep:oklch(38% 0.09 150);
  --accent-wash:oklch(92% 0.04 142);
  --ext:oklch(52% 0.13 46);
  --ext-wash:oklch(93% 0.045 55);

  --space-2xs:4px; --space-xs:8px; --space-sm:12px; --space-md:20px;
  --space-lg:32px; --space-xl:52px; --space-2xl:80px;

  --ease-out:cubic-bezier(.22,.61,.36,1);
  --ease-in-out:cubic-bezier(.45,.05,.55,.95);

  --rail-w:236px; --shell:1220px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{overflow-x:clip}
body{
  background:var(--paper);color:var(--ink);
  font-family:var(--font-body);line-height:1.62;
  font-feature-settings:"tnum" 1;
  -webkit-font-smoothing:antialiased;
}
a{color:inherit;text-decoration:none}
::selection{background:var(--accent-wash)}

/* ---------- masthead ---------- */
.masthead{
  border-bottom:1.5px solid var(--rule-strong);
  background:var(--paper);
  padding:var(--space-lg) var(--space-md) var(--space-md);
}
.masthead-in{max-width:var(--shell);margin:0 auto}
.kicker{
  font-family:var(--font-mono);font-size:11px;letter-spacing:.28em;
  text-transform:uppercase;color:var(--accent);margin-bottom:var(--space-sm);
}
.masthead h1{
  font-family:var(--font-display);font-weight:900;font-style:normal;
  font-size:clamp(28px,5.2vw,46px);line-height:1.04;letter-spacing:-.01em;
  overflow-wrap:anywhere;min-width:0;
}
.lede{
  margin-top:var(--space-sm);max-width:64ch;color:var(--ink-soft);
  font-size:15px;line-height:1.6;
}
.lede a{color:var(--accent-deep);border-bottom:1px solid var(--accent-wash)}
.lede a:hover{border-bottom-color:var(--accent)}

.searchbar{
  margin-top:var(--space-md);display:flex;align-items:baseline;gap:var(--space-md);
  flex-wrap:wrap;
}
.search{
  flex:1;min-width:min(100%,320px);
  padding:12px 2px;border:none;border-bottom:1.5px solid var(--rule-strong);
  background:transparent;color:var(--ink);font-family:var(--font-body);
  font-size:17px;outline:none;transition:border-color .18s var(--ease-out);
}
.search::placeholder{color:var(--ink-faint)}
.search:focus-visible{border-bottom-color:var(--accent);box-shadow:0 1.5px 0 0 var(--accent)}
.readout{
  font-family:var(--font-mono);font-size:12.5px;color:var(--ink-soft);
  white-space:nowrap;
}
.readout b{color:var(--accent-deep);font-weight:500}

/* ---------- shell ---------- */
.shell{
  max-width:var(--shell);margin:0 auto;
  display:grid;grid-template-columns:var(--rail-w) 1fr;
  align-items:start;gap:0;
}
.shell>*{min-width:0}

/* ---------- rail ---------- */
.rail{
  position:sticky;top:0;align-self:start;
  padding:var(--space-lg) var(--space-md) var(--space-2xl) var(--space-md);
  border-right:1px solid var(--rule);
}
.rail-title{
  font-family:var(--font-mono);font-size:11px;letter-spacing:.24em;
  text-transform:uppercase;color:var(--ink-faint);
  padding-bottom:var(--space-xs);margin-bottom:var(--space-xs);
  border-bottom:1px solid var(--rule);
}
.rail ul{list-style:none}
.rail li{
  display:flex;align-items:baseline;justify-content:space-between;gap:var(--space-sm);
  padding:7px 10px 7px 12px;margin:1px 0;cursor:pointer;position:relative;
  border-radius:2px;color:var(--ink-soft);
  transition:color .15s var(--ease-out),background-color .15s var(--ease-out);
}
.rail li::before{
  content:"";position:absolute;left:0;top:50%;height:60%;width:2px;
  background:var(--accent);transform:translateY(-50%) scaleY(0);
  transform-origin:center;transition:transform .18s var(--ease-out);
}
.rail li:hover{color:var(--ink);background:var(--paper-inset)}
.rail li.active{color:var(--accent-deep);background:var(--accent-wash)}
.rail li.active::before{transform:translateY(-50%) scaleY(1)}
.rail li:focus-visible{outline:2px solid var(--accent);outline-offset:1px}
.rail-name{font-size:14px}
.rail-count{
  font-family:var(--font-mono);font-size:12px;color:var(--ink-faint);
  font-variant-numeric:tabular-nums;
}
.rail li.active .rail-count{color:var(--accent-deep)}

/* ---------- catalogue ---------- */
.catalogue{padding:var(--space-lg) var(--space-md) var(--space-2xl) var(--space-xl)}
.cat-block{margin-bottom:var(--space-xl)}
.cat-head{
  display:flex;align-items:baseline;gap:var(--space-sm);
  padding-bottom:var(--space-xs);margin-bottom:var(--space-sm);
  border-bottom:1.5px solid var(--rule-strong);
}
.cat-head h2{
  font-family:var(--font-display);font-weight:600;font-style:normal;
  font-size:clamp(20px,2.6vw,26px);line-height:1.15;letter-spacing:-.01em;
  overflow-wrap:anywhere;min-width:0;
}
.cat-full{
  font-family:var(--font-mono);font-size:12px;color:var(--ink-faint);
  font-weight:400;letter-spacing:.02em;
}
.cat-count{
  margin-left:auto;font-family:var(--font-mono);font-size:13px;
  color:var(--accent-deep);font-variant-numeric:tabular-nums;white-space:nowrap;
}

.entry{
  display:grid;grid-template-columns:52px 1fr auto;
  column-gap:var(--space-md);align-items:baseline;
  padding:var(--space-md) 0;border-bottom:1px solid var(--rule);
  transition:background-color .16s var(--ease-out);
}
.entry:hover{background:var(--paper-inset)}
.entry:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:2px}
.entry-num{
  font-family:var(--font-mono);font-size:13px;color:var(--ink-faint);
  font-variant-numeric:tabular-nums;padding-top:3px;letter-spacing:.02em;
}
.entry:hover .entry-num{color:var(--accent)}
.entry-head{display:flex;align-items:baseline;flex-wrap:wrap;gap:8px 12px}
.entry-title{
  font-family:var(--font-display);font-weight:600;font-style:normal;
  font-size:18px;line-height:1.3;letter-spacing:-.005em;
  overflow-wrap:anywhere;min-width:0;
}
.entry:hover .entry-title{color:var(--accent-deep)}
.entry-en{
  font-family:var(--font-mono);font-size:12px;color:var(--ink-faint);
  font-style:normal;letter-spacing:.01em;
}
.tag-ext{
  font-family:var(--font-mono);font-size:10.5px;letter-spacing:.04em;
  color:var(--ext);background:var(--ext-wash);
  padding:2px 7px;border-radius:2px;
}
.entry-desc{
  margin-top:6px;color:var(--ink-soft);font-size:14px;line-height:1.66;
  max-width:74ch;
}
.entry-tags{margin-top:10px;display:flex;flex-wrap:wrap;gap:6px}
.entry-tags span{
  font-family:var(--font-mono);font-size:11px;color:var(--ink-soft);
  padding:2px 8px;border:1px solid var(--rule-strong);border-radius:2px;
  white-space:nowrap;
}
.entry-go{
  font-family:var(--font-mono);font-size:12px;color:var(--accent-deep);
  white-space:nowrap;padding-top:3px;
  transform:translateX(0);transition:transform .16s var(--ease-out),color .16s var(--ease-out);
}
.entry:hover .entry-go{transform:translateX(3px);color:var(--accent)}

/* fade primitive on filter */
.fade-in{animation:fade .32s var(--ease-out) both}
@keyframes fade{from{opacity:0}to{opacity:1}}

.empty{
  padding:var(--space-2xl) 0;text-align:center;color:var(--ink-soft);
  font-family:var(--font-display);font-size:20px;font-style:normal;
}
.empty small{display:block;margin-top:8px;font-family:var(--font-body);font-size:14px;color:var(--ink-faint)}

/* ---------- footer ---------- */
footer{
  border-top:1.5px solid var(--rule-strong);
  max-width:var(--shell);margin:0 auto;
  padding:var(--space-md);
  font-family:var(--font-mono);font-size:12px;color:var(--ink-faint);
  line-height:1.7;
}
footer a{color:var(--accent-deep);border-bottom:1px solid var(--accent-wash)}
footer a:hover{border-bottom-color:var(--accent)}

/* ---------- mobile ---------- */
@media (max-width:860px){
  .shell{grid-template-columns:1fr}
  .rail{
    position:sticky;top:0;z-index:5;
    border-right:none;border-bottom:1px solid var(--rule);
    background:var(--paper);
    padding:var(--space-sm) var(--space-md);
  }
  .rail-title{display:none}
  .rail ul{
    display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;
    scrollbar-width:thin;
  }
  .rail li{
    flex:0 0 auto;white-space:nowrap;border:1px solid var(--rule);
    border-radius:999px;padding:6px 12px;margin:0;
  }
  .rail li::before{display:none}
  .rail li.active{border-color:var(--accent)}
  .rail-count{margin-left:2px}
  .catalogue{padding:var(--space-md)}
}
@media (max-width:560px){
  .entry{grid-template-columns:1fr;row-gap:2px}
  .entry-num{padding-top:0;order:0}
  .entry-go{grid-column:1;padding-top:8px}
  .cat-head{flex-wrap:wrap}
  .cat-count{margin-left:0;flex-basis:100%}
}
@media (prefers-reduced-motion:reduce){
  *{animation-duration:.001ms !important;transition-duration:.12s !important}
  .fade-in{animation:none}
  .entry:hover .entry-go{transform:none}
}
</style>
</head>
<body>
<header class="masthead">
  <div class="masthead-in">

    <h1>超棒的 LLM 应用大全</h1>

</header>

</div>

<footer>

</footer>

MCP）→ 记忆与会话（内存/SQLite）→ 回调 → 插件 → 多 Agent 编排。模型无关、部署无关。", "tech": ["Google ADK", "Gemini 3 Flash", "多 Agent"], "url": "https://github.com/Shubhamsaboo/awesome-llm-apps/tree/main/ai_agent_framework_crash_course/google_adk_crash_course/", "external": false}, {"cat": "框架速成课", "catFull": "Agent Framework 速成课", "catId": "course", "emoji": "🧑‍🏫", "cn": "OpenAI Agents SDK 速成课", "en": "OpenAI Agents SDK Crash Course", "desc": "系统学 OpenAI Agents SDK：入门 Agent、函数调用、结构化输出、工具、记忆、评测、handoff、swarm 编排与路由逻辑。", "tech": ["OpenAI Agents SDK"], "url": "https://github.com/Shubhamsaboo/awesome-llm-apps/tree/main/ai_agent_framework_crash_course/openai_sdk_crash_course/", "external": false}];
const CATS = [{"id": "skills", "cn": "Agent 技能"}, {"id": "starter", "cn": "入门 Agent"}, {"id": "advanced", "cn": "生产级 Agent"}, {"id": "alwayson", "cn": "常驻 Agent"}, {"id": "teams", "cn": "多 Agent 团队"}, {"id": "voice", "cn": "语音 Agent"}, {"id": "genui", "cn": "生成式 UI"}, {"id": "game", "cn": "玩游戏 Agent"}, {"id": "mcp", "cn": "MCP Agent"}, {"id": "rag", "cn": "RAG 检索增强"}, {"id": "memory", "cn": "带记忆的应用"}, {"id": "chatx", "cn": "万物皆可聊"}, {"id": "opt", "cn": "成本优化"}, {"id": "finetune", "cn": "模型微调"}, {"id": "course", "cn": "框架速成课"}];

// counts derived from DATA (avoids drift)
const catCount = {};
DATA.forEach(d => { catCount[d.catId] = (catCount[d.catId] || 0) + 1; });
const catFullOf = {};
DATA.forEach(d => { if(!catFullOf[d.catId]) catFullOf[d.catId] = d.catFull; });

let activeCat = "all", keyword = "";
const rail = document.getElementById("rail");
const list = document.getElementById("list");
const empty = document.getElementById("empty");
const readout = document.getElementById("readout");
const search = document.getElementById("search");

function esc(s){return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}

// ---------- rail ----------
function buildRail(){
  const railTitle = document.createElement("div");
  railTitle.className = "rail-title";
  railTitle.textContent = "分类索引";
  rail.appendChild(railTitle);

  const ul = document.createElement("ul");
  const items = [{id:"all", cn:"全部", count:DATA.length}]
    .concat(CATS.map(c => ({id:c.id, cn:c.cn, count:catCount[c.id]||0})));
  items.forEach(it => {
    const li = document.createElement("li");
    li.tabIndex = 0;
    li.dataset.cat = it.id;
    if(it.id === activeCat) li.classList.add("active");
    li.innerHTML = `<span class="rail-name">${esc(it.cn)}</span><span class="rail-count">${it.count}</span>`;
    const activate = () => {
      activeCat = it.id;
      [...ul.children].forEach(x => x.classList.remove("active"));
      li.classList.add("active");
      render();
      document.querySelector(".catalogue").scrollIntoView({behavior:"smooth", block:"start"});
    };
    li.addEventListener("click", activate);
    li.addEventListener("keydown", e => { if(e.key==="Enter"||e.key===" "){e.preventDefault();activate();} });
    ul.appendChild(li);
  });
  rail.appendChild(ul);
}

// ---------- catalogue ----------
function entryNode(d, n){
  const a = document.createElement("a");
  a.className = "entry";
  a.href = d.url; a.target = "_blank"; a.rel = "noopener";
  a.title = d.en;
  const tags = d.tech.map(t => `<span>${esc(t)}</span>`).join("");
  const ext = d.external ? `<span class="tag-ext">外部仓库</span>` : "";
  a.innerHTML = `
    <div class="entry-num">${String(n).padStart(3,"0")}</div>
    <div class="entry-main">
      <div class="entry-head">
        <h3 class="entry-title">${esc(d.cn)}</h3>
        <span class="entry-en">${esc(d.en)}</span>
        ${ext}
      </div>
      <p class="entry-desc">${esc(d.desc)}</p>
      <div class="entry-tags">${tags}</div>
    </div>
    <div class="entry-go">GitHub&nbsp;↗</div>`;
  return a;
}

function render(){
  const kw = keyword;
  const matches = DATA.filter(d => {
    if(activeCat !== "all" && d.catId !== activeCat) return false;
    if(!kw) return true;
    const hay = (d.cn + " " + d.en + " " + d.desc + " " + d.tech.join(" ") + " " + d.cat).toLowerCase();
    return hay.includes(kw);
  });

  list.innerHTML = "";
  empty.style.display = matches.length ? "none" : "block";
  readout.innerHTML = `共 <b>${matches.length}</b> / ${DATA.length} 个项目`;

  const catsToShow = activeCat === "all" ? CATS : CATS.filter(c => c.id === activeCat);
  let n = 0;
  catsToShow.forEach(c => {
    const items = matches.filter(d => d.catId === c.id);
    if(!items.length) return;
    const block = document.createElement("section");
    block.className = "cat-block fade-in";
    const head = document.createElement("header");
    head.className = "cat-head";
    head.innerHTML = `<h2>${esc(c.cn)}</h2><span class="cat-full">${esc(catFullOf[c.id]||"")}</span><span class="cat-count">${items.length} 项</span>`;
    block.appendChild(head);
    const wrap = document.createElement("div");
    wrap.className = "entries";
    items.forEach(d => { n++; wrap.appendChild(entryNode(d, n)); });
    block.appendChild(wrap);
    list.appendChild(block);
  });
}

search.addEventListener("input", e => { keyword = e.target.value.trim().toLowerCase(); render(); });

buildRail();
render();
</script>
