<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>最实用 Skills 推荐 · 产品老A</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:#070b16;display:flex;align-items:center;justify-content:center;min-height:100vh}
  body{
    color:#e6ecff;
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
    padding:24px;
  }

  /* 3:4 竖版 slide 960x1280 */
  .stage{
    width:960px;
    aspect-ratio:3/4;
    background:
      radial-gradient(900px 500px at 15% -8%, rgba(167,139,250,.18), transparent 60%),
      radial-gradient(800px 520px at 110% 108%, rgba(56,189,248,.16), transparent 55%),
      #0b1020;
    border:1px solid #27325a;
    border-radius:22px;
    padding:46px 46px 50px;
    display:flex;
    flex-direction:column;
    overflow:hidden;
    box-shadow:0 30px 80px rgba(0,0,0,.55);
  }

  .title{
    text-align:center;
    font-size:44px;
    font-weight:900;
    letter-spacing:1px;
    line-height:1.15;
    margin-bottom:24px;
    background:linear-gradient(90deg,#a78bfa,#f472b6,#fb923c,#facc15,#34d399,#38bdf8);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    background-clip:text;
  }

  .table{flex:1;display:flex;flex-direction:column}

  .header{
    display:grid;
    grid-template-columns:1.8fr 1fr 1fr 1fr;
    align-items:center;
    padding:16px 18px;
    background:#162041;
    border:1px solid #27325a;
    border-radius:10px;
    margin-bottom:4px;
  }
  .header span{font-size:16.5px;font-weight:800;color:#f472b6;text-align:left}
  .header span:nth-child(2){color:#38bdf8}
  .header span:nth-child(3){color:#a78bfa}
  .header span:nth-child(4){color:#facc15}

  #list{flex:1;display:flex;flex-direction:column}

  .item{
    flex:1;
    display:grid;
    grid-template-columns:1.8fr 1fr 1fr 1fr;
    align-items:center;
    padding:0 18px;
    border:1px solid #27325a;
    border-top:none;
    background:#111933;
    transition:background .15s;
    opacity:0;
    transform:translateY(18px);
    animation:slideIn .9s ease forwards;
  }
  .item:first-child{border-top:1px solid #27325a;border-radius:10px 10px 0 0}
  .item:last-child{border-radius:0 0 10px 10px}
  .item:hover{background:#1c2952}
  @keyframes slideIn{to{opacity:1;transform:translateY(0)}}

  .name-cell{display:flex;align-items:center;gap:12px;min-width:0}
  .rank-no{font-size:15px;font-weight:800;color:#4c5a86;width:24px;text-align:center;flex-shrink:0}
  .avatar{
    width:38px;height:38px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-size:16px;font-weight:800;color:#0b1020;flex-shrink:0;
  }
  .project-name{font-size:17.5px;font-weight:700;color:#e6ecff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

  .tag-badge{
    display:inline-block;padding:4px 11px;border-radius:6px;
    font-size:12.5px;font-weight:700;background:#0b1020;
    border:1px solid #27325a;white-space:nowrap;
  }

  .desc{font-size:13.5px;color:#9aa7d0;line-height:1.4;text-align:left;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-right:8px}

  .score{text-align:left;font-size:17px;font-weight:800;white-space:nowrap}
  .score .bolt{margin-right:3px;font-size:13px}
  .score.tier1{color:#facc15}
  .score.tier2{color:#fb923c}
  .score.tier3{color:#34d399}

  .brand{
    margin-top:22px;
    display:flex;align-items:center;justify-content:center;gap:10px;
    font-size:17px;color:#fff;font-weight:800;letter-spacing:.5px;
    opacity:0;animation:fadeIn .6s ease forwards;animation-delay:8s;
  }
  @keyframes fadeIn{to{opacity:1}}
  .brand-logo{width:36px;height:36px;border-radius:50%;object-fit:cover}
</style>
</head>
