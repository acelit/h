<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>anthropics/skills 安装量排行榜</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    background:#0b1020;
    color:#e6ecff;
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
    padding:48px 32px;
    min-height:100vh;
  }
  .container{max-width:780px;margin:0 auto}

  .title{
    text-align:center;
    font-size:48px;
    font-weight:900;
    letter-spacing:1px;
    margin-bottom:8px;
    background:linear-gradient(90deg,#a78bfa,#f472b6,#fb923c,#facc15,#34d399,#38bdf8);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    background-clip:text;
  }
  .subtitle{
    text-align:center;
    color:#6b78a8;
    font-size:14px;
    font-style:italic;
    margin-bottom:28px;
  }

  .header{
    display:grid;
    grid-template-columns:300px 120px 1fr 100px;
    align-items:center;
    padding:18px 16px;
    background:#162041;
    border:1px solid #27325a;
    border-radius:10px;
    margin-bottom:4px;
  }
  .header span{font-size:15px;font-weight:800;color:#f472b6}
  .header span:nth-child(2){color:#38bdf8}
  .header span:nth-child(3){color:#a78bfa}
  .header span:nth-child(4){color:#facc15;text-align:right}

  .item{
    display:grid;
    grid-template-columns:300px 120px 1fr 100px;
    align-items:center;
    padding:16px 16px;
    border:1px solid #27325a;
    border-top:none;
    background:#111933;
    transition:background .15s;
    opacity:0;
    transform:translateY(20px);
    animation:slideIn 1s ease forwards;
  }
  .item:first-child{border-top:1px solid #27325a;border-radius:10px 10px 0 0}
  .item:last-child{border-radius:0 0 10px 10px}
  .item:hover{background:#1c2952}

  @keyframes slideIn{to{opacity:1;transform:translateY(0)}}

  .name-cell{display:flex;align-items:center;gap:12px}
  .rank-no{font-size:13px;font-weight:800;color:#4b5a86;width:22px;text-align:right;flex-shrink:0}
  .avatar{
    width:36px;height:36px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-size:14px;font-weight:800;color:#0b1020;flex-shrink:0;
  }
  .project-name{font-size:14px;font-weight:700;color:#e6ecff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

  .tag-badge{
    display:inline-block;padding:4px 10px;border-radius:6px;
    font-size:11.5px;font-weight:600;background:#0b1020;
    border:1px solid #27325a;color:#9aa7d0;white-space:nowrap;
  }

  .desc{font-size:12.5px;color:#9aa7d0;line-height:1.4;padding-right:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

  .stars{text-align:right;font-size:15px;font-weight:800;white-space:nowrap}
  .stars .bolt{margin-right:3px}
  .stars.tier1{color:#facc15}
  .stars.tier2{color:#fb923c}
  .stars.tier3{color:#34d399}

  .footer{
    text-align:center;margin-top:32px;
    opacity:0;animation:fadeIn .5s ease forwards;
    animation-delay:10s;
  }
  @keyframes fadeIn{to{opacity:1}}
  .footer .brand{font-size:15px;color:#fff;font-weight:800;letter-spacing:1px;display:flex;align-items:center;justify-content:center;gap:10px}
  .brand-logo{width:30px;height:30px;border-radius:50%;object-fit:cover}

  @media(max-width:800px){
    body{padding:24px 12px}
    .header,.item{grid-template-columns:220px 100px 1fr 80px;gap:4px}
    .title{font-size:30px}
    .project-name{font-size:12px}
  }

  @media(max-width:560px){
    body{padding:24px 12px}
    .header{display:none}
    .item{grid-template-columns:1fr;gap:8px;padding:14px 16px}
    .name-cell{gap:10px}
    .project-name{white-space:normal;overflow:visible;text-overflow:clip}
    .tag-badge{justify-self:start}
    .desc{white-space:normal;overflow:visible;text-overflow:clip;padding-right:0}
    .stars{text-align:left}
  }
</style>
</head>
